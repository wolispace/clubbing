<section class="section">
  <div class="row">
    <div class="datebox">
      <div class="date">
        <div class="monthday">{{weekday}} {{monthday}}</div>
        <div class="month">{{month}}</div>
      </div>
    </div>
    <div class="bookbox">
      <div class="books">{{things}}</div>
    </div>
  </div>
  <div class="location"><span class="host">{{host}}</span> {{location}}</div>
  <div class="edit" onclick="editSection('{{sectionId}}')"><i class="fas fa-pencil"></i></div>
</section>
